<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Index Aletheia</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bree+Serif:wght@400&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400&display=swap" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="header-top-app-bar">
        <div class="container">
          <div class="container-1"><div class="icon"></div></div>
          <div class="heading">
            <span class="l-index-aletheia">L'INDEX ALETHEIA</span>
          </div>
        </div>
        <div class="container-2"><div class="icon-3"></div></div>
      </div>
      <div class="main">
        <div class="hero-section">
          <span class="featured-authors">Featured Authors</span>
          <div class="frame">
            <div class="living-room">
              <div class="bg"><div class="image"></div></div>
            </div>
            <div class="living-room-4">
              <div class="bg-5"><div class="image-6"></div></div>
            </div>
            <div class="bathroom">
              <div class="bg-7"><div class="image-8"></div></div>
            </div>
            <div class="bathroom-9">
              <div class="bg-a"><div class="image-b"></div></div>
            </div>
          </div>
          <div class="input">
            <div class="container-c">
              <span class="search-author-keyword"
                >Search author or keyword...</span
              >
            </div>
          </div>
        </div>
        <div class="wisdom-gallery">
          <div class="philosophy-character">
            <div class="philo"></div>
            <div class="philo-d"></div>
            <div class="philo-e"></div>
            <div class="philo-f"></div>
            <div class="philo-10"></div>
            <div class="philo-11"></div>
          </div>
        </div>
        <div class="design-system-tokens-footer">
          <div class="philo-squote">
            <div class="flex-row-e">
              <div class="image-12"></div>
              <div class="image-13"></div>
              <div class="image-14"></div>
            </div>
            <div class="flex-row-ffd">
              <div class="image-15"></div>
              <div class="image-16"></div>
              <div class="image-17"></div>
            </div>
          </div>
          <div class="navigation">
            <div class="background">
              <div class="container-18"><div class="icon-19"></div></div>
              <div class="container-1a"><span class="home">HOME</span></div>
            </div>
            <div class="container-1b">
              <div class="container-1c"><div class="icon-1d"></div></div>
              <div class="container-1e">
                <span class="authors"> Authors</span>
              </div>
            </div>
            <div class="container-1f">
              <div class="container-20"><div class="icon-21"></div></div>
              <div class="container-22">
                <span class="quotes">Quotes </span>
              </div>
            </div>
            <div class="container-23">
              <div class="container-24"><div class="icon-25"></div></div>
              <div class="container-26"><span class="search">Search</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
